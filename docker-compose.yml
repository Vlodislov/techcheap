version: '3'

services:

  backend:
    build:
      dockerfile: ./backend/DockerFile
      context: .
    env_file:
      - ".env.docker"
    ports:
      - "5000:5000"
    command: uvicorn src.main:app --reload --host 0.0.0.0 --port 5000
    depends_on:
      - db

  frontend:
    build: ./frontend
    volumes:
      - './frontend:/app'
      - '/app/node_modules'
    ports:
      - "8080:8080"
    depends_on:
      - backend
  db:
    image: postgres
    env_file:
      - ".env.docker"
    ports:
      - "6789:5432"
    container_name: "db_FastAPI"
