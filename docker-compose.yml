version: '3'

services:

  backend:
    build:
      dockerfile: DockerFile
      context: ./backend/
    env_file:
      - "./backend/.env.docker"
    ports:
      - "5000:5000"
    command: uvicorn main:app --reload --host 0.0.0.0 --port 5000
    depends_on:
      - db

  frontend:
    build:
      dockerfile: DockerFile
      context: ./frontend
    volumes:
      - './frontend:/app'
      - '/app/node_modules'
    ports:
      - "8080:8080"

  db:
    image: postgres
    env_file:
      - "./backend/.env.docker"
    ports:
      - "6689:5432"
    container_name: "db_FastAPI_techcheap"

  redis:
    image: redis
    ports:
      - "6379:6379"
